name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase credentials (if secrets are set)
        run: |
          FIREBASE_KEY='${{ secrets.FIREBASE_API_KEY }}'
          AI_URL='${{ secrets.AI_FUNCTION_URL }}'

          # Create config file with secrets injected
          cat > config.deploy.js << 'ENDOFFILE'
          window.CONFIG = {
            FIREBASE_API_KEY: '__FIREBASE_API_KEY__',
            AI_FUNCTION_URL: '__AI_FUNCTION_URL__'
          };
          ENDOFFILE

          # Replace placeholders if secrets exist
          if [ ! -z "$FIREBASE_KEY" ]; then
            sed -i "s|__FIREBASE_API_KEY__|$FIREBASE_KEY|g" config.deploy.js
          fi
          if [ ! -z "$AI_URL" ]; then
            sed -i "s|__AI_FUNCTION_URL__|$AI_URL|g" config.deploy.js
          fi

          # Inject script tag into HTML
          sed -i '/<title>/i\  <script src="config.deploy.js"><\/script>' index.html
          echo "✓ Configuration injected"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
